<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 650" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="978" height="648" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- header bar -->
  <path d="M1 17 A16 16 0 0 1 17 1 H963 A16 16 0 0 1 979 17 V64 H1 Z" fill="#f8fafc"/>
  <line x1="1" y1="64" x2="979" y2="64" stroke="#e2e8f0" stroke-width="2"/>
  <g transform="translate(20,14) scale(0.36)">
    <rect x="2" y="2" width="96" height="96" rx="24" fill="#1e293b"/>
    <path d="M24 78 L24 48 A26 26 0 0 1 76 48 L76 78 L64 78 L64 49 A14 14 0 0 0 36 49 L36 78 Z" fill="#ffffff"/>
    <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><path d="M32 61 H56"/><path d="M49 55 L61 61 L49 67"/></g>
  </g>
  <text x="68" y="40" font-size="19" font-weight="700" fill="#0f172a">ODBC/JDBC Gateway</text>
  <rect x="800" y="15" width="158" height="34" rx="8" fill="#2563eb"/>
  <text x="879" y="37" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">▶  Test step</text>

  <!-- vertical divider form | output -->
  <line x1="556" y1="64" x2="556" y2="649" stroke="#e2e8f0" stroke-width="2"/>

  <!-- form fields -->
  <g font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
    <!-- helper to read: label + input -->
    <g>
      <text x="28" y="100" font-size="13" font-weight="600" fill="#334155">Resource</text>
      <rect x="28" y="110" width="500" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="42" y="134" font-size="15" fill="#0f172a">Table</text>
      <text x="512" y="134" font-size="12" fill="#94a3b8">▾</text>
    </g>
    <g>
      <text x="28" y="172" font-size="13" font-weight="600" fill="#334155">Operation</text>
      <rect x="28" y="182" width="500" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="42" y="206" font-size="15" fill="#0f172a">Select</text>
      <text x="512" y="206" font-size="12" fill="#94a3b8">▾</text>
    </g>
    <g>
      <text x="28" y="244" font-size="13" font-weight="600" fill="#334155">Connection</text>
      <circle cx="118" cy="240" r="7.5" fill="none" stroke="#cbd5e1"/><text x="118" y="244" text-anchor="middle" font-size="10" fill="#94a3b8">?</text>
      <rect x="28" y="254" width="500" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="42" y="278" font-size="15" fill="#0f172a">pg_test  (jdbc · postgres)</text>
      <text x="512" y="278" font-size="12" fill="#94a3b8">▾</text>
    </g>
    <g>
      <text x="28" y="316" font-size="13" font-weight="600" fill="#334155">Schema</text>
      <rect x="28" y="326" width="240" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="42" y="350" font-size="15" fill="#0f172a">public</text>
      <text x="252" y="350" font-size="12" fill="#94a3b8">▾</text>
      <text x="288" y="316" font-size="13" font-weight="600" fill="#334155">Table</text>
      <rect x="288" y="326" width="240" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="302" y="350" font-size="15" fill="#0f172a">gw_demo</text>
      <text x="512" y="350" font-size="12" fill="#94a3b8">▾</text>
    </g>
    <g>
      <text x="28" y="388" font-size="13" font-weight="600" fill="#334155">Output Columns</text>
      <rect x="28" y="398" width="500" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <g font-size="13" fill="#1e40af">
        <rect x="40" y="406" width="46" height="22" rx="11" fill="#eff6ff" stroke="#bfdbfe"/><text x="63" y="421" text-anchor="middle">id</text>
        <rect x="94" y="406" width="64" height="22" rx="11" fill="#eff6ff" stroke="#bfdbfe"/><text x="126" y="421" text-anchor="middle">name</text>
        <rect x="166" y="406" width="52" height="22" rx="11" fill="#eff6ff" stroke="#bfdbfe"/><text x="192" y="421" text-anchor="middle">qty</text>
      </g>
    </g>
    <g>
      <text x="28" y="460" font-size="13" font-weight="600" fill="#334155">Conditions (WHERE)</text>
      <rect x="28" y="470" width="230" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="42" y="494" font-size="15" fill="#0f172a">qty</text><text x="242" y="494" font-size="12" fill="#94a3b8">▾</text>
      <rect x="266" y="470" width="84" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="280" y="494" font-size="15" fill="#0f172a">&gt;</text><text x="334" y="494" font-size="12" fill="#94a3b8">▾</text>
      <rect x="358" y="470" width="170" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="372" y="494" font-size="15" fill="#0f172a">0</text>
    </g>
    <g>
      <text x="28" y="546" font-size="13" font-weight="600" fill="#334155">Sort</text>
      <rect x="28" y="556" width="230" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="42" y="580" font-size="15" fill="#0f172a">id</text><text x="242" y="580" font-size="12" fill="#94a3b8">▾</text>
      <rect x="266" y="556" width="120" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="280" y="580" font-size="15" fill="#0f172a">DESC</text><text x="370" y="580" font-size="12" fill="#94a3b8">▾</text>
      <text x="410" y="546" font-size="13" font-weight="600" fill="#334155">Limit</text>
      <rect x="410" y="556" width="118" height="38" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="424" y="580" font-size="15" fill="#0f172a">50</text>
    </g>
  </g>

  <!-- output panel -->
  <text x="580" y="100" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="1">OUTPUT</text>
  <rect x="648" y="86" width="74" height="22" rx="11" fill="#dcfce7"/><text x="685" y="101" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">3 items</text>

  <g font-size="14">
    <rect x="580" y="124" width="372" height="40" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="600" y="149" font-weight="700" fill="#334155">id</text>
    <text x="680" y="149" font-weight="700" fill="#334155">name</text>
    <text x="880" y="149" font-weight="700" fill="#334155">qty</text>

    <rect x="580" y="164" width="372" height="38" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="600" y="188" fill="#0f172a">1</text><text x="680" y="188" fill="#0f172a">alfa</text><text x="880" y="188" fill="#0f172a">2</text>
    <rect x="580" y="202" width="372" height="38" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="600" y="226" fill="#0f172a">2</text><text x="680" y="226" fill="#0f172a">bravo</text><text x="880" y="226" fill="#0f172a">4</text>
    <rect x="580" y="240" width="372" height="38" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="600" y="264" fill="#0f172a">3</text><text x="680" y="264" fill="#0f172a">charlie</text><text x="880" y="264" fill="#0f172a">6</text>
  </g>
  <text x="580" y="312" font-size="13" fill="#64748b">Each row becomes a separate n8n item, with named fields.</text>
</svg>
