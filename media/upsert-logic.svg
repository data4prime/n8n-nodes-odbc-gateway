<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 360" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1 L8 5 L2 9" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="1058" height="358" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="40" y="52" font-size="20" font-weight="700" fill="#0f172a">Upsert — how it decides</text>

  <!-- box 1 -->
  <rect x="40" y="120" width="180" height="72" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="130" y="150" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">Row to upsert</text>
  <text x="130" y="172" text-anchor="middle" font-size="13" fill="#64748b">match cols + values</text>

  <line x1="220" y1="156" x2="262" y2="156" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>

  <!-- box 2 -->
  <rect x="266" y="120" width="200" height="72" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="366" y="150" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">SELECT on key</text>
  <text x="366" y="172" text-anchor="middle" font-size="13" fill="#3b6fd4">does the row exist?</text>

  <line x1="466" y1="156" x2="506" y2="156" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>

  <!-- decision diamond -->
  <polygon points="600,108 690,156 600,204 510,156" fill="#fffbeb" stroke="#fde68a" stroke-width="2"/>
  <text x="600" y="161" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">Exists?</text>

  <!-- yes -> update -->
  <path d="M650 130 L770 92" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="688" y="100" font-size="12" font-weight="700" fill="#16a34a">YES</text>
  <rect x="780" y="58" width="232" height="70" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="896" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">UPDATE</text>
  <text x="896" y="110" text-anchor="middle" font-size="13" fill="#15803d">set the non-key columns</text>

  <!-- no -> insert -->
  <path d="M650 182 L770 220" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="688" y="220" font-size="12" font-weight="700" fill="#2563eb">NO</text>
  <rect x="780" y="186" width="232" height="70" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="896" y="216" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">INSERT</text>
  <text x="896" y="238" text-anchor="middle" font-size="13" fill="#3b6fd4">add the new row</text>

  <!-- footer -->
  <rect x="40" y="288" width="972" height="44" rx="10" fill="#f1f5f9"/>
  <text x="526" y="315" text-anchor="middle" font-size="14" fill="#334155">Standard SQL only — same logic on PostgreSQL, MySQL, SQL Server, Oracle and IBM i. No MERGE / ON CONFLICT required.</text>
</svg>
