name: Publish to npm

# Pubblica il pacchetto su npm quando viene creato un tag vX.Y.Z.
# Richiede il secret NPM_TOKEN (Automation token del registry npm).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # consente la provenance npm

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # --ignore-scripts evita la compilazione nativa di isolated-vm
      # (dipendenza di n8n-workflow, serve solo per i tipi in fase di build).
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} != package.json ${PKG_VERSION}"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
